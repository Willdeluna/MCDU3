name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast checks: typecheck + unit tests (no browser needed) ──
  lint-and-test:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest
    env:
      AIRCRAFT_ADAPTER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck:all

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build

      - name: Bundle size check
        run: |
          du -sh dist/ 2>/dev/null || echo "No dist/ directory — skipping bundle size check"

      - name: Status docs are consolidated
        run: npm run check:status-docs

  # ── Slower checks: E2E with Playwright (needs browser) ──
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      AIRCRAFT_ADAPTER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e:ci
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ── Security audit: block high/critical production dependency issues ──
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  # ── Docker build verification: ensure image builds successfully ──
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t virtual-cdu:test .
